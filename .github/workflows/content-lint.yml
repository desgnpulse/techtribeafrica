name: Content Lint

on:
  push:
    paths:
      - 'src/content/**'
      - 'data/**'
  pull_request:
    paths:
      - 'src/content/**'
      - 'data/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run content lint
        run: bash scripts/lint-content.sh src/content/
